<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const BASE_URL = 'http://ctdg.me/live/39704219/93785263/3916293.m3u8';
const PROXY = 'https://klyonbr-production.up.railway.app/?url=';

const video = document.getElementById('video');

function setStatus(txt){
  document.getElementById("status").textContent = txt;
}

function play(){
  setStatus("Conectando...");

  const proxiedUrl = PROXY + encodeURIComponent(BASE_URL);

  if(Hls.isSupported()){
    const hls = new Hls({
      debug: false,

      // 🔥 FORÇA PROXY EM TUDO
      xhrSetup: function(xhr, url) {
        const newUrl = PROXY + encodeURIComponent(url);
        xhr.open('GET', newUrl, true);
      }
    });

    hls.loadSource(proxiedUrl);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
      setStatus("Ao vivo 🔴");
    });

    hls.on(Hls.Events.ERROR, function() {
      setStatus("Erro ao reproduzir");
    });

  } else {
    video.src = proxiedUrl;
    video.play();
  }
}

setStatus("Pronto para testar");
</script>
