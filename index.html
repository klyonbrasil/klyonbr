<script>
const BASE_URL = 'http://ctdg.me/';
const USER = '39704219';
const PASS = '93785263';

// 🔥 SEU PROXY DA RAILWAY
const PROXY = 'https://klyonbr-production.up.railway.app/?url=';

let player;

// STATUS
function setStatus(txt){
  document.getElementById("status").textContent = txt;
}

// PLAYER
function play(id){
  setStatus("Conectando...");

  if(player){
    player.dispose();
  }

  player = videojs("video");

  const stream = `${BASE_URL}/live/${USER}/${PASS}/${id}.m3u8`;

  const url = PROXY + encodeURIComponent(stream);

    src: url,
    type: "application/x-mpegURL"

  }).catch(()=>{
    setStatus("Erro ao reproduzir");
