<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premiere Canais</title>

  <!-- Video.js -->
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0d0d;color:#f0f0f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;min-height:100vh;}

    header{background:linear-gradient(90deg,#1a003a,#3d0078);padding:14px 24px;display:flex;align-items:center;box-shadow:0 2px 12px #00000080;}
    .logo{font-size:1.5rem;font-weight:800;color:#c084fc;letter-spacing:1px;}
    .subtitle{font-size:.8rem;color:#a78bfa;margin-top:2px;}

    #status{text-align:center;padding:9px;font-size:.85rem;color:#a78bfa;background:#13002b;border-bottom:1px solid #2d0060;}

    .main{display:flex;flex:1;overflow:hidden;}

    /* SIDEBAR */
    .sidebar{width:270px;min-width:200px;background:#110022;border-right:1px solid #2d0060;display:flex;flex-direction:column;overflow:hidden;}
    .search-box{padding:9px 11px;border-bottom:1px solid #2d0060;}
    .search-box input{width:100%;background:#1e0040;border:1px solid #5b21b6;border-radius:7px;color:#f0f0f0;padding:7px 11px;font-size:.83rem;outline:none;}
    .search-box input::placeholder{color:#7c3aed;}
    .search-box input:focus{border-color:#c084fc;}
    .channel-list{overflow-y:auto;flex:1;}
    .channel-list::-webkit-scrollbar{width:4px;}
    .channel-list::-webkit-scrollbar-thumb{background:#5b21b6;border-radius:4px;}

    .channel-item{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;border-bottom:1px solid #1a003a;transition:background .15s;}
    .channel-item:hover{background:#1e0040;}
    .channel-item.active{background:#3d0078;border-left:3px solid #c084fc;}
    .channel-item img{width:34px;height:34px;object-fit:contain;border-radius:4px;background:#1e0040;}
    .ch-name{font-size:.8rem;font-weight:600;color:#e9d5ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ch-num{font-size:.68rem;color:#7c3aed;}

    /* PLAYER */
    .player-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;}
    .player-wrapper{width:100%;max-width:960px;}
    .player-title{font-size:1.1rem;font-weight:700;color:#c084fc;margin-bottom:10px;text-align:center;}

    .player-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 0 32px #5b21b650;position:relative;}
    #mainVideo{width:100%!important;height:100%!important;}
    .video-js .vjs-big-play-button{background:#7c3aed;border:none;border-radius:50%;width:60px;height:60px;line-height:60px;font-size:22px;margin:-30px 0 0 -30px;}
    .video-js .vjs-control-bar{background:linear-gradient(0deg,#1a003aee,transparent);}
    .video-js .vjs-play-progress{background:#c084fc;}
    .video-js .vjs-volume-level{background:#c084fc;}

    .badge{position:absolute;top:10px;right:12px;font-size:.7rem;padding:3px 10px;border-radius:20px;z-index:20;pointer-events:none;font-weight:600;}
    .badge.live{background:#16a34a;color:#fff;}
    .badge.loading{background:#7c3aed;color:#fff;}
    .badge.error{background:#dc2626;color:#fff;}

    .placeholder{width:100%;aspect-ratio:16/9;background:#110022;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#5b21b6;font-size:.95rem;gap:10px;border:2px dashed #2d0060;}
    .placeholder svg{width:58px;height:58px;opacity:.45;}

    .spinner{width:44px;height:44px;border:4px solid #2d0060;border-top-color:#c084fc;border-radius:50%;animation:spin .75s linear infinite;margin:auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .error-msg{color:#f87171;text-align:center;padding:20px;font-size:.88rem;line-height:1.6;}
    .retry-btn{margin-top:12px;background:#7c3aed;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;}
    .retry-btn:hover{background:#9333ea;}
    .empty-msg{color:#7c3aed;text-align:center;padding:28px 12px;font-size:.83rem;}

    @media(max-width:640px){
      .main{flex-direction:column;}
      .sidebar{width:100%;min-width:unset;height:200px;border-right:none;border-bottom:1px solid #2d0060;}
      .player-area{padding:10px;}
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">PREMIERE</div>
    <div class="subtitle">Canais ao vivo</div>
  </div>
</header>

<div id="status">Carregando canais Premiere...</div>

<div class="main">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Buscar canal..." oninput="filterChannels()"/>
    </div>
    <div class="channel-list" id="channelList">
      <div class="empty-msg">Aguardando canais...</div>
    </div>
  </div>

  <div class="player-area">
    <div class="player-wrapper">
      <div class="player-title" id="playerTitle">Selecione um canal</div>
      <div id="playerContainer">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 9v9A2.25 2.25 0 004.5 18.75z"/>
          </svg>
          Escolha um canal na lista
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE_URL = 'http://ctdg.me';
const USER     = '39704219';
const PASS     = '93785263';

let allChannels   = [];
let vjsPlayer     = null;
let currentStream = null;
let watchdog      = null;
let reconnecting  = false;

// ── PROXIES para API (JSON) ──────────────────────────────────────────────────
async function fetchJSON(url) {
  const proxyUrl = `/api/proxy?url=${encodeURIComponent(url)}`;

  const r = await fetch(proxyUrl);
  if (!r.ok) throw new Error('HTTP ' + r.status);

  return await r.json();
}

async function fetchJSON(url) {
  let lastErr;
  for (const fn of PROXIES) {
    try {
      const r = await fetch(fn(url), { signal: AbortSignal.timeout(9000) });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return JSON.parse(await r.text());
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

// ── CARREGAR CANAIS ──────────────────────────────────────────────────────────
async function loadChannels() {
  try {
    const cats = await fetchJSON(
      `${BASE_URL}/player_api.php?username=${USER}&password=${PASS}&action=get_live_categories`
    );
    const premCats = cats.filter(c => {
  const name = c.category_name.toLowerCase();
  return name.includes('jogos do dia') || name.includes('premiere') || name.includes('sportv') || name.includes('caze tv') || name.includes('espn');
});
    if (!premCats.length) {
      setStatus('Nenhuma categoria Premiere encontrada.');
      return;
    }
    setStatus(`Categorias: ${premCats.map(c=>c.category_name).join(', ')} — carregando...`);

    const res = await Promise.all(premCats.map(c =>
      fetchJSON(`${BASE_URL}/player_api.php?username=${USER}&password=${PASS}&action=get_live_streams&category_id=${c.category_id}`)
    ));
    allChannels = res.flat();
    setStatus(`${allChannels.length} canal(is) Premiere`);
    renderChannels(allChannels);
  } catch(e) {
    setStatus('Erro: ' + e.message);
    document.getElementById('channelList').innerHTML =
      `<div class="empty-msg">Falha na conexão.<br>${e.message}</div>`;
  }
}

function setStatus(t) { document.getElementById('status').textContent = t; }

function renderChannels(channels) {
  const list = document.getElementById('channelList');
  if (!channels.length) { list.innerHTML = '<div class="empty-msg">Nenhum canal.</div>'; return; }
  list.innerHTML = channels.map((ch, i) => `
    <div class="channel-item" id="ch_${ch.stream_id}"
         onclick="playChannel(${ch.stream_id},'${esc(ch.name)}','${esc(ch.stream_icon||'')}')">
      <img src="${ch.stream_icon||''}" alt=""
           onerror="this.src='https://placehold.co/34x34/1e0040/c084fc?text=TV'"/>
      <div>
        <div class="ch-name">${ch.name}</div>
        <div class="ch-num">#${ch.num||(i+1)}</div>
      </div>
    </div>`).join('');
}

function filterChannels() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderChannels(allChannels.filter(ch => ch.name.toLowerCase().includes(q)));
}

// ── PLAYER ───────────────────────────────────────────────────────────────────
function streamUrl(id) {
  return `/api/proxy?url=${encodeURIComponent(
  `${BASE_URL}/live/${USER}/${PASS}/${id}.m3u8`
)}`;
}

function playChannel(streamId, name) {
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ch_' + streamId);
  if (el) el.classList.add('active');
  document.getElementById('playerTitle').textContent = name;

  currentStream = streamId;
  reconnecting  = false;
  clearTimeout(watchdog);
  initPlayer(streamId);
}

function initPlayer(streamId) {
  const container = document.getElementById('playerContainer');

  // destruir player anterior
  if (vjsPlayer) {
    try { vjsPlayer.dispose(); } catch(_) {}
    vjsPlayer = null;
  }

  // montar HTML
  container.innerHTML = `
    <div class="player-box" id="playerBox">
      <video id="mainVideo" class="video-js vjs-default-skin vjs-big-play-centered"
             playsinline crossorigin="anonymous"></video>
      <div class="badge loading" id="badge">Conectando...</div>
    </div>`;

  const url = streamUrl(streamId);

  vjsPlayer = videojs('mainVideo', {
    autoplay: true,
    muted: false,
    controls: true,
    preload: 'auto',
    liveui: true,
    html5: {
      vhs: {
        overrideNative: true,
        enableLowInitialPlaylist: true,
        limitRenditionByPlayerDimensions: false,
        smoothQualityChange: true,
        maxPlaylistRetries: 20,
        // pré-carrega mais segmentos para aguentar variações de rede
        bufferBasedABR: false,
      },
      nativeAudioTracks: false,
      nativeVideoTracks: false,
    },
  });

  vjsPlayer.src({ src: url, type: 'application/x-mpegURL' });

  vjsPlayer.on('playing', () => {
    setBadge('live', 'Ao vivo');
    reconnecting = false;
    startWatchdog();
  });

  // waiting/stalled são normais durante buffering — só mostra badge, NÃO reconecta
  vjsPlayer.on('waiting', () => setBadge('loading', 'Buffering...'));
  vjsPlayer.on('stalled', () => setBadge('loading', 'Buffering...'));

  // só reconecta em erro fatal real
  vjsPlayer.on('error', () => scheduleReconnect('erro'));

  vjsPlayer.play().catch(() => {});
}

function setBadge(cls, text) {
  const b = document.getElementById('badge');
  if (!b) return;
  b.className = 'badge ' + cls;
  b.textContent = text;
}

function startWatchdog() {
  clearTimeout(watchdog);
  if (!vjsPlayer || vjsPlayer.isDisposed()) return;
  let last = vjsPlayer.currentTime();
  watchdog = setTimeout(function check() {
    if (!vjsPlayer || vjsPlayer.isDisposed() || vjsPlayer.paused()) return;
    const now = vjsPlayer.currentTime();
    if (now === last && !reconnecting) {
      scheduleReconnect('sem progresso');
    } else {
      last = now;
      watchdog = setTimeout(check, 6000);
    }
  }, 6000);
}

function scheduleReconnect(reason) {
  if (reconnecting) return;
  reconnecting = true;
  clearTimeout(watchdog);
  setBadge('loading', `Reconectando...`);
  console.log('[player] reconectando:', reason);

  setTimeout(() => {
    if (currentStream === null) return;
    reconnecting = false;
    initPlayer(currentStream);
  }, 3000);
}

function esc(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

loadChannels();
</script>
</body>
</html>
