<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  background:#0d0d0d;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px
}
button{
  padding:10px 20px;
  margin:10px;
  background:#7c3aed;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer
}
video{
  width:100%;
  max-width:800px;
  background:#000
}
</style>
</head>

<body>

<h2 id="status">Pronto</h2>

<button onclick="play()">Testar Canal</button>

<video id="video" controls autoplay></video>

<script>
const STREAM = 'http://ctdg.me/live/39704219/93785263/3916293.m3u8';

// 👉 SEU PROXY DA RAILWAY
const PROXY = 'https://klyonbr-production.up.railway.app/?url=';

let hls;

function setStatus(txt){
  document.getElementById("status").textContent = txt;
}

function play(){
  setStatus("Conectando...");

  const video = document.getElementById('video');
  const url = PROXY + encodeURIComponent(STREAM);

  if(hls){
    hls.destroy();
  }

  if(Hls.isSupported()){
    hls = new Hls();

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
      setStatus("Ao vivo 🔴");
    });

    hls.on(Hls.Events.ERROR, function(event, data) {
      console.log(data);
      setStatus("Erro ao reproduzir");
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.addEventListener('loadedmetadata', function() {
      video.play();
      setStatus("Ao vivo 🔴");
    });
  }
}
</script>

</body>
</html>
