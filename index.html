<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player IPTV</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<style>
body{background:#0d0d0d;color:#fff;font-family:sans-serif;text-align:center;padding:20px}
button{padding:10px 20px;margin:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<h2 id="status">Carregando...</h2>

<button onclick="play(3916293)">Testar Canal</button>

<div style="max-width:800px;margin:auto;">
<video id="video" class="video-js vjs-default-skin" controls autoplay style="width:100%"></video>
</div>

<script>
const BASE_URL = 'http://ctdg.me';
const USER = '39704219';
const PASS = '93785263';

let player;

// PROXY
function proxy(url){
  return `/api/proxy?url=${encodeURIComponent(url)}`;
}

// STATUS SEGURO
function setStatus(txt){
  const el = document.getElementById("status");
  if(el) el.textContent = txt;
}

// PLAYER
function play(id){
  setStatus("Conectando...");

  if(player){
    player.dispose();
  }

  player = videojs("video");

  const url = proxy(`${BASE_URL}/live/${USER}/${PASS}/${id}.m3u8`);

  player.src({
    src: url,
    type: "application/x-mpegURL"
  });

  player.play().then(()=>{
    setStatus("Ao vivo 🔴");
  }).catch(()=>{
    setStatus("Erro ao reproduzir");
  });
}

// INIT
document.addEventListener("DOMContentLoaded", ()=>{
  setStatus("Pronto para testar");
});
</script>

</body>
</html>
